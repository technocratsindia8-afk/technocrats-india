<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Technocrats Hub - Technocrats India</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
  --primary:#4da3ff;
  --secondary:#7b61ff;
  --dark:#070B1A;
  --card:#151D35;
  --text:#EAF1FF;
  --muted:#9FAFD1;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
  radial-gradient(circle at top right, rgba(77,163,255,0.15), transparent 30%),
  radial-gradient(circle at bottom left, rgba(123,97,255,0.15), transparent 30%),
  linear-gradient(180deg,#050816 0%, #0D1328 100%);
  font-family:'Segoe UI',sans-serif;
  color:var(--text);
  min-height:100vh;
  padding-bottom:100px;
}

/* HEADER */

.topbar{
  padding:20px;
}

.header-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.back-btn{
  width:45px;
  height:45px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  font-size:20px;
}

.page-title h4{
  margin:0;
  font-weight:700;
}

.page-title span{
  color:var(--muted);
  font-size:13px;
}


/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  left:15px;
  right:15px;
  bottom:18px;
  background:rgba(16,24,44,0.95);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:14px 10px;
  display:flex;
  justify-content:space-around;
}

.bottom-nav a{
  text-decoration:none;
  color:#8f9fc5;
  font-size:13px;
  text-align:center;
}

.bottom-nav a.active{
  color:var(--primary);
}

.bottom-nav span{
  display:block;
  font-size:20px;
  margin-bottom:4px;
}

</style>


</head>

<body>

<!-- HEADER -->

<div class="topbar">

  <div class="header-box">

    <a href="index.html" class="back-btn">
      ←
    </a>

    <div class="page-title">
      <h4>Technocrats Hub</h4>
      <span>Your Hub For Digital Growth</span>
    </div>

    <div style="width:45px;"></div>

  </div>

</div>


<!-- HERO BANNER -->

<div class="hub-hero">

  <img id="featuredThumb">

  <div class="hub-overlay">

    <div class="featured-badge">
      FEATURED VIDEO
    </div>

    <h1 id="featuredTitle">
      Technocrats Hub
    </h1>

    <p>
      Watch digital marketing, SEO, branding and business growth videos.
    </p>

    <button class="watch-btn"
    onclick="playVideo(videos[0].id)">
      ▶ Watch Now
    </button>

  </div>

</div>

<!-- VIDEO PLAYER -->

<div id="videoPlayerSection" style="display:none;padding:0 20px 25px;">

    <div style="
        background:#151D35;
        border-radius:25px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,.35);
    ">

        <iframe
            id="mainPlayer"
            width="100%"
            height="500"
            src=""
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>

    </div>

</div>


<!-- SEARCH -->

<div class="hub-search">

  <input
  type="text"
  id="videoSearch"
  placeholder="Search videos...">

</div>


<!-- CATEGORY FILTER -->

<div class="category-wrap">

  <button class="cat-btn active" data-cat="All">All</button>

  <button class="cat-btn" data-cat="Podcast">Podcast</button>

  <button class="cat-btn" data-cat="Education">Education</button>

  <button class="cat-btn" data-cat="Beauty Clinic">Beauty Clinic</button>

  <button class="cat-btn" data-cat="Boutique">Boutique</button>

  <button class="cat-btn" data-cat="Medical">Medical</button>

  <button class="cat-btn" data-cat="E-commerce">E-commerce</button>

</div>


<!-- TRENDING -->

<div class="ott-section">

  <div class="section-head">
    <h5>🔥 Trending Videos</h5>
  </div>

  <div class="video-row" id="videoContainer">

  </div>

</div>


<!-- CONTINUE WATCHING -->

<div class="ott-section">

  <div class="section-head">
    <h5>▶ Continue Watching</h5>
  </div>

  <div class="video-row" id="continueWatching">

  </div>

</div>

<div id="videoPopup" class="video-popup">
    <div class="video-popup-content">
        <span class="close-video" onclick="closeVideo()">✕</span>

        <iframe
            id="youtubePlayer"
            src=""
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>
    </div>
</div>


<style>
       .hub-hero{
        margin:10px 20px 25px;
        height:350px;
        border-radius:30px;
        overflow:hidden;
        position:relative;
        }

        .hub-hero img{
        width:100%;
        height:100%;
        object-fit:cover;
        }

        .hub-overlay{
        position:absolute;
        inset:0;
        background:linear-gradient(to top,
        rgba(0,0,0,.95),
        rgba(0,0,0,.2));
        padding:35px;
        display:flex;
        flex-direction:column;
        justify-content:end;
        }

        .featured-badge{
        display:inline-block;
        background:#4da3ff;
        padding:6px 14px;
        border-radius:50px;
        margin-bottom:12px;
        color:#fff;
        width:max-content;
        }

        .watch-btn{
        width:180px;
        height:55px;
        border:none;
        border-radius:15px;
        background:linear-gradient(135deg,#4da3ff,#7b61ff);
        color:#fff;
        font-weight:600;
        }

        .hub-search{
        padding:0 20px 20px;
        }

        .hub-search input{
        width:100%;
        height:58px;
        border:none;
        background:#151D35;
        border-radius:18px;
        padding:0 20px;
        color:#fff;
        }

        .category-wrap{
        padding:0 20px 20px;
        display:flex;
        gap:10px;
        overflow:auto;
        }

        .category-wrap::-webkit-scrollbar{
        display:none;
        }

        .cat-btn{
        border:none;
        padding:10px 18px;
        border-radius:50px;
        background:#151D35;
        color:#fff;
        white-space:nowrap;
        }

        .cat-btn.active{
        background:#4da3ff;
        }

        .ott-section{
        padding:0 20px 25px;
        }

        .video-row{
        display:flex;
        gap:18px;
        overflow-x:auto;
        padding-bottom:10px;
        }

        .video-row::-webkit-scrollbar{
        display:none;
        }

        .video-card{
        width:280px;
        flex-shrink:0;
        background:#151D35;
        border-radius:22px;
        overflow:hidden;
        cursor:pointer;
        transition:.3s;
        }

        .video-card:hover{
        transform:scale(1.04);
        }

        .video-card img{
        width:100%;
        height:160px;
        object-fit:cover;
        }

        .video-info{
        padding:15px;
        }

        .video-info h6{
        color:#fff;
        margin-bottom:5px;
        }

        .video-info p{
        color:#9FAFD1;
        font-size:13px;
        margin:0;
        }

        /* PLAYER */

        .video-popup{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.92);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:99999;

        opacity:0;
        visibility:hidden;
        transition:.3s;
        }

        .video-popup.active{
        opacity:1;
        visibility:visible;
        }

        .video-popup-content{
        width:95%;
        max-width:1100px;
        position:relative;
        }

        .video-popup-content iframe{
        width:100%;
        height:70vh;
        border-radius:20px;
        }

        .close-video{
        position:absolute;
        top:-50px;
        right:0;
        font-size:32px;
        color:#fff;
        cursor:pointer;
        }

        @media(max-width:768px){

        .video-popup-content iframe{
        height:250px;
        }

        }
</style>

<script>

        const videos = [

        {
          title:"Podcast Marketing Tips",
          category:"Podcast",
          id:"7ITHQTZMvYo"
        },

        {
        title:"Subhojit Educare",
        category:"Education",
        id:"NGXwMFpV0ls"
        },

        {
        title:"KareU",
        category:"Beauty Clinic",
        id:"jRmQ8Ycg2iQ"
        },

        {
        title:"Meraki Weaves",
        category:"Boutique",
        id:"VAzv4j0RJq8"
        },

        {
        title:"Angel Hut",
        category:"Education",
        id:"LxsCNIr9K78"
        },

        {
        title:"RGS Rehab Care",
        category:"Medical",
        id:"vek4KYyzv_g"
        },

        {
        title:"A to Z Wedding Mart",
        category:"E-commerce",
        id:"XxjjHIJmTtM"
        }


        ];

        const container =
        document.getElementById("videoContainer");

        const featuredThumb =
        document.getElementById("featuredThumb");

        /* HERO THUMBNAIL */

        featuredThumb.src =
        "https://img.youtube.com/vi/" +
        videos[0].id +
        "/hqdefault.jpg";

        /* LOAD VIDEOS */

        function loadVideos(list){

        container.innerHTML = "";

        list.forEach(video=>{

        container.innerHTML += `

        <div class="video-card"
        onclick="playVideo('${video.id}')">

        <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg"
        alt="${video.title}">

        <div class="video-info">

        <h6>${video.title}</h6>

        <p>${video.category}</p>

        </div>

        </div>

        `;

        });

        }

        loadVideos(videos);

        /* PLAY VIDEO */

        function playVideo(id){

        localStorage.setItem("lastVideo",id);

        const popup =
        document.getElementById("videoPopup");

        const player =
        document.getElementById("youtubePlayer");

        popup.classList.add("active");

        player.src =
        "https://www.youtube.com/embed/" +
        id +
        "?autoplay=1&rel=0";

        }

        /* CLOSE VIDEO */

        function closeVideo(){

        document
        .getElementById("videoPopup")
        .classList.remove("active");

        document
        .getElementById("youtubePlayer")
        .src = "";

        }

        /* CONTINUE WATCHING */

        const lastVideo =
        localStorage.getItem("lastVideo");

        if(lastVideo){

        document.getElementById("continueWatching").innerHTML =

        `

        <div class="video-card"
        onclick="playVideo('${lastVideo}')">

        <img src="https://img.youtube.com/vi/${lastVideo}/hqdefault.jpg">

        <div class="video-info">

        <h6>Continue Watching</h6>

        <p>Resume Video</p>

        </div>

        </div>

        `;

        }

        /* SEARCH */

        document
        .getElementById("videoSearch")
        .addEventListener("input",function(){

        const search =
        this.value.toLowerCase();

        const filtered =
        videos.filter(video =>
        video.title.toLowerCase().includes(search)
        );

        loadVideos(filtered);

        });

        /* CATEGORY FILTER */

        document
        .querySelectorAll(".cat-btn")
        .forEach(btn=>{

        btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".cat-btn")
        .forEach(b=>b.classList.remove("active"));

        btn.classList.add("active");

        const cat =
        btn.getAttribute("data-cat");

        if(cat==="All"){

        loadVideos(videos);

        }else{

        loadVideos(

        videos.filter(video =>
        video.category === cat
        )

        );

        }

        });

        });

</script>



<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <a href="index.html">
    <span>🏠</span>
    Home
  </a>

  <a href="services.html" class="active">
    <span>💼</span>
    Services
  </a>

  <a href="hub.html">
    <span>🎬</span>
    Hub
  </a>

  <a href="contact.html">
    <span>📞</span>
    Contact
  </a>

</div>

</body>
</html>
